# fly.toml app configuration file generated for mahd-metals-api on 2026-05-17T22:10:18+06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'mahd-metals-api'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[env]
  ENVIRONMENT = 'production'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
